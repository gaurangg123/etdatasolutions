# /etc/nginx/sites-available/etdatasolutions.com
# Symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/etdatasolutions.com /etc/nginx/sites-enabled/
# Then run: sudo certbot --nginx -d etdatasolutions.com -d www.etdatasolutions.com

server {
    listen 80;
    server_name etdatasolutions.com www.etdatasolutions.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name etdatasolutions.com www.etdatasolutions.com;

    # SSL — filled in by Certbot
    # ssl_certificate     /etc/letsencrypt/live/etdatasolutions.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/etdatasolutions.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main app proxy
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
